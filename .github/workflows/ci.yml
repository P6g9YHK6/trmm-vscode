name: CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci
        shell: bash

      - name: Lint
        run: npm run lint
        shell: bash

      - name: Compile
        run: npm run compile
        shell: bash

      - name: Package VSIX
        run: npx vsce package --out trmm-vscode.vsix
        shell: bash

      - uses: actions/upload-artifact@v5
        with:
          name: vsix
          path: trmm-vscode.vsix
          if-no-files-found: error

  publish:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: lint-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci
        shell: bash

      - name: Verify VSCE_PAT is set
        run: |
          if [ -z "${{ secrets.VSCE_PAT }}" ]; then
            echo "::error::VSCE_PAT secret is not set — cannot publish to VS Marketplace"
            exit 1
          fi
        shell: bash

      - name: Generate changelog
        run: |
          chmod +x .github/scripts/generate-changelog.sh
          ./.github/scripts/generate-changelog.sh "0.${{ github.run_number }}.0"
        shell: bash

      - name: Bump version
        id: version
        run: |
          VER="0.${{ github.run_number }}.0"
          if npm version "$VER" --no-git-tag-version --allow-same-version 2>/dev/null; then
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          else
            # Fallback: manually set version in package.json
            echo "npm version failed, setting manually"
            node -e "
              const p = require('./package.json');
              p.version = '$VER';
              require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
            "
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          fi
          echo "Bumped to $VER"
        shell: bash

      - name: Commit version and changelog
        id: commit
        run: |
          git config user.name "P6g9YHK6"
          git config user.email "P6g9YHK6@users.noreply.github.com"

          git add package.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo "Nothing to commit — skipping"
            echo "::notice::No changes detected after version bump"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Version ${{ steps.version.outputs.version }} [skip ci]"
            git tag "v${{ steps.version.outputs.version }}"
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Publish to VS Marketplace
        id: publish
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=5
          for i in $(seq 1 "$MAX_RETRIES"); do
            if npx @vscode/vsce publish -p "${{ secrets.VSCE_PAT }}" 2>/tmp/vsce_err.txt; then
              echo "success=true" >> "$GITHUB_OUTPUT"
              echo "Published successfully"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES failed. Retrying in ${RETRY_DELAY}s..."
            sleep "$RETRY_DELAY"
          done
          echo "::error::All $MAX_RETRIES publish attempts failed"
          cat /tmp/vsce_err.txt >&2
          echo "success=false" >> "$GITHUB_OUTPUT"
          exit 1
        shell: bash

      - name: Push tags and commit to origin
        if: steps.commit.outputs.skipped != 'true' && steps.publish.outputs.success == 'true'
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=5
          for i in $(seq 1 "$MAX_RETRIES"); do
            if git pull --rebase --autostash origin main && git push origin main --tags 2>/tmp/push_err.txt; then
              echo "Pushed successfully"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES push failed. Retrying in ${RETRY_DELAY}s..."
            sleep "$RETRY_DELAY"
          done
          echo "::warning::Push failed after $MAX_RETRIES attempts — tag exists locally but may not be on remote"
          cat /tmp/push_err.txt >&2
        shell: bash

      - name: Notify publish failure
        if: always() && steps.publish.outcome == 'failure'
        run: |
          echo "::error::Publish to VS Marketplace failed for version ${{ steps.version.outputs.version }}"
          echo "Check the VS Marketplace publisher page and push the tag manually:"
          echo "  git push origin v${{ steps.version.outputs.version }}"
        shell: bash
