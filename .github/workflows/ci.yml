name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run lint

      - run: npm run compile

      - run: npx vsce package --out trmm-vscode.vsix

      - uses: actions/upload-artifact@v5
        with:
          name: vsix
          path: trmm-vscode.vsix

  publish:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: lint-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - run: npm ci

      - name: Generate changelog
        run: ./.github/scripts/generate-changelog.sh "0.${{ github.run_number }}.0"

      - name: Bump version
        run: |
          npm version "0.${{ github.run_number }}.0" --no-git-tag-version --allow-same-version

      - name: Commit version and changelog
        run: |
          git config user.name "P6g9YHK6"
          git config user.email "P6g9YHK6@users.noreply.github.com"
          git add package.json CHANGELOG.md
          git commit -m "Version 0.${{ github.run_number }}.0 [skip ci]"
          git tag "v0.${{ github.run_number }}.0"

      - name: Publish to VS Marketplace
        run: npx @vscode/vsce publish -p "${{ secrets.VSCE_PAT }}"

      - name: Push tags to origin
        run: |
          git pull --rebase origin main
          git push origin main --tags
