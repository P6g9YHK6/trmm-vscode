name: CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PUBLISH_VSCE: true
  PUBLISH_OVSX: true

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v5

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Test
        run: npm test -- --coverage

  build:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: check
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.set-version.outputs.version }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Set version
        id: set-version
        run: |
          VER="0.${{ github.run_number }}.0"
          npm version "$VER" --no-git-tag-version --allow-same-version 2>/dev/null || node -e "
            const p = require('./package.json');
            p.version = '$VER';
            require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
          "
          echo "version=$VER" >> "$GITHUB_OUTPUT"
          echo "Bumped to $VER"

      - name: Compile
        run: npm run compile

      - name: Package VSIX
        run: npx @vscode/vsce package --out trmm-vscode.vsix

      - uses: actions/upload-artifact@v5
        with:
          name: vsix
          path: trmm-vscode.vsix
          if-no-files-found: error

  publish:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v5
        with:
          name: vsix

      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Publish to VS Marketplace
        if: env.PUBLISH_VSCE == 'true'
        run: |
          if [ -z "${{ secrets.VSCE_PAT }}" ]; then
            echo "::error::VSCE_PAT secret is not set"
            exit 1
          fi
          for i in 1 2 3; do
            if npx @vscode/vsce publish --packagePath trmm-vscode.vsix -p "${{ secrets.VSCE_PAT }}" 2>/tmp/vsce_err.txt; then
              echo "Published to VS Marketplace"
              exit 0
            fi
            echo "Attempt $i/3 failed. Retrying in 5s..."
            sleep 5
          done
          echo "::error::All 3 publish attempts failed"
          cat /tmp/vsce_err.txt >&2
          exit 1

      - name: Publish to OpenVSX
        if: env.PUBLISH_OVSX == 'true'
        run: |
          if [ -z "${{ secrets.OPENVSX_TOKEN }}" ]; then
            echo "::error::OPENVSX_TOKEN secret is not set"
            exit 1
          fi
          for i in 1 2 3; do
            if npx ovsx publish trmm-vscode.vsix -p "${{ secrets.OPENVSX_TOKEN }}" 2>/tmp/ovsx_err.txt; then
              echo "Published to OpenVSX"
              exit 0
            fi
            echo "Attempt $i/3 failed. Retrying in 5s..."
            sleep 5
          done
          echo "::error::All 3 publish attempts failed"
          cat /tmp/ovsx_err.txt >&2
          exit 1

  release:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/download-artifact@v5
        with:
          name: vsix

      - name: Generate changelog
        run: |
          chmod +x .github/scripts/generate-changelog.sh
          ./.github/scripts/generate-changelog.sh "${{ needs.build.outputs.version }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VER="v${{ needs.build.outputs.version }}"
          gh release create "$VER" \
            --title "$VER" \
            --notes-file CHANGELOG.md \
            trmm-vscode.vsix
