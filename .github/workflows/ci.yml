name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - run: npm run lint

      - run: npm run compile

      - run: npx vsce package --out trmm-vscode.vsix

      - uses: actions/upload-artifact@v4
        with:
          name: vsix
          path: trmm-vscode.vsix

  publish:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: lint-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - run: npm ci

      - name: Publish with run-number version
        run: |
          git config user.name "P6g9YHK6"
          git config user.email "P6g9YHK6@users.noreply.github.com"
          VERSION="0.1.${{ github.run_number }}"
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          git add package.json
          git commit -m "Version $VERSION [skip ci]"
          git tag "v$VERSION"
          npx @vscode/vsce publish -p "${{ secrets.VSCE_PAT }}"
          git push origin main --tags
