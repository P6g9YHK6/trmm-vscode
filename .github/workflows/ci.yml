name: CI/CD

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  PUBLISH_VSCE: true
  PUBLISH_OVSX: false

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci
        shell: bash

      - name: Lint
        run: npm run lint
        shell: bash

      - name: Compile
        run: npm run compile
        shell: bash

      - name: Package VSIX
        run: npx @vscode/vsce package --out trmm-vscode.vsix
        shell: bash

      - uses: actions/upload-artifact@v5
        with:
          name: vsix
          path: trmm-vscode.vsix
          if-no-files-found: error

  publish:
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: lint-and-build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: npm

      - uses: actions/download-artifact@v5
        with:
          name: vsix

      - name: Install dependencies
        run: npm ci
        shell: bash

      - name: Generate changelog
        run: |
          chmod +x .github/scripts/generate-changelog.sh
          ./.github/scripts/generate-changelog.sh "0.${{ github.run_number }}.0"
        shell: bash

      - name: Bump version
        id: version
        run: |
          VER="0.${{ github.run_number }}.0"
          if npm version "$VER" --no-git-tag-version --allow-same-version 2>/dev/null; then
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          else
            echo "npm version failed, setting manually"
            node -e "
              const p = require('./package.json');
              p.version = '$VER';
              require('fs').writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
            "
            echo "version=$VER" >> "$GITHUB_OUTPUT"
          fi
          echo "Bumped to $VER"
        shell: bash

      - name: Commit version and changelog
        id: commit
        run: |
          git config user.name "P6g9YHK6"
          git config user.email "P6g9YHK6@users.noreply.github.com"

          git add package.json CHANGELOG.md
          if git diff --cached --quiet; then
            echo "Nothing to commit — skipping"
            echo "::notice::No changes detected after version bump"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Version ${{ steps.version.outputs.version }} [skip ci]"
            git tag "v${{ steps.version.outputs.version }}"
            echo "skipped=false" >> "$GITHUB_OUTPUT"
          fi
        shell: bash

      - name: Publish
        id: publish
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=5
          ALL_OK=true
          PIDS=""

          publish_vsce() {
            local i
            for i in $(seq 1 "$MAX_RETRIES"); do
              if npx @vscode/vsce publish -p "${{ secrets.VSCE_PAT }}" 2>/tmp/vsce_err.txt; then
                echo "vsce: published" >&2
                return 0
              fi
              echo "vsce: attempt $i/$MAX_RETRIES failed, retrying in ${RETRY_DELAY}s..." >&2
              sleep "$RETRY_DELAY"
            done
            echo "vsce: all attempts failed" >&2
            cat /tmp/vsce_err.txt >&2
            return 1
          }

          publish_ovsx() {
            local i
            for i in $(seq 1 "$MAX_RETRIES"); do
              if npx ovsx publish trmm-vscode.vsix -p "${{ secrets.OPENVSX_TOKEN }}" 2>/tmp/ovsx_err.txt; then
                echo "ovsx: published" >&2
                return 0
              fi
              echo "ovsx: attempt $i/$MAX_RETRIES failed, retrying in ${RETRY_DELAY}s..." >&2
              sleep "$RETRY_DELAY"
            done
            echo "ovsx: all attempts failed" >&2
            cat /tmp/ovsx_err.txt >&2
            return 1
          }

          if [ "${{ env.PUBLISH_VSCE }}" = "true" ]; then
            if [ -z "${{ secrets.VSCE_PAT }}" ]; then
              echo "::error::PUBLISH_VSCE is true but VSCE_PAT secret is not set"
              ALL_OK=false
            else
              publish_vsce &
              PIDS="$PIDS $!"
            fi
          else
            echo "vsce: disabled" >&2
          fi

          if [ "${{ env.PUBLISH_OVSX }}" = "true" ]; then
            if [ -z "${{ secrets.OPENVSX_TOKEN }}" ]; then
              echo "::error::PUBLISH_OVSX is true but OPENVSX_TOKEN secret is not set"
              ALL_OK=false
            else
              publish_ovsx &
              PIDS="$PIDS $!"
            fi
          else
            echo "ovsx: disabled" >&2
          fi

          for pid in $PIDS; do
            wait "$pid" || ALL_OK=false
          done

          if [ "$ALL_OK" = true ]; then
            echo "success=true" >> "$GITHUB_OUTPUT"
            echo "All enabled registries published"
            exit 0
          fi

          echo "::error::One or more enabled registries failed to publish"
          echo "success=false" >> "$GITHUB_OUTPUT"
          exit 1
        shell: bash

      - name: Push tags and commit to origin
        if: steps.commit.outputs.skipped != 'true' && steps.publish.outputs.success == 'true'
        run: |
          MAX_RETRIES=3
          RETRY_DELAY=5
          for i in $(seq 1 "$MAX_RETRIES"); do
            if git pull --rebase --autostash origin main && git push origin main --tags 2>/tmp/push_err.txt; then
              echo "Pushed successfully"
              exit 0
            fi
            echo "Attempt $i/$MAX_RETRIES push failed. Retrying in ${RETRY_DELAY}s..."
            sleep "$RETRY_DELAY"
          done
          echo "::warning::Push failed after $MAX_RETRIES attempts — tag exists locally but may not be on remote"
          cat /tmp/push_err.txt >&2
        shell: bash

      - name: Notify publish failure
        if: always() && steps.publish.outcome == 'failure'
        run: |
          echo "::error::Publish failed for version ${{ steps.version.outputs.version }}"
          echo "Check registry status and push the tag manually:"
          echo "  git push origin v${{ steps.version.outputs.version }}"
        shell: bash
